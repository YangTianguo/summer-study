<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/summer-study/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="暑期提分 - 学习计划与家长控制小软件">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="暑期提分">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>暑期提分</title>
  <link rel="manifest" href="manifest.json">
</head>
<style>
  #loading {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; background: #f0f4ff;
    font-family: -apple-system, "Microsoft YaHei", sans-serif;
    z-index: 9999;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid #e0e0e0;
    border-top-color: #4A90D9;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: #999; }
</style>
<div id="loading">
  <div class="spinner"></div>
  <div class="title">📚 暑期提分</div>
  <div class="subtitle">加载中，请稍候...</div>
</div>
<script>
  // 加载完成后隐藏 loading，加载失败显示错误
  window.addEventListener('flutter-first-frame', function() {
    var el = document.getElementById('loading');
    if (el) el.remove();
  });
  window.addEventListener('error', function(e) {
    if (e.target && e.target.tagName === 'SCRIPT') {
      var el = document.getElementById('loading');
      if (el) el.innerHTML = '<div style="font-size:18px;color:#e53935;">⚠️ 加载失败</div><div style="font-size:14px;color:#999;margin-top:8px;">请检查网络连接后刷新重试</div>';
    }
  }, true);
  // 10秒后还没加载完就提示
  setTimeout(function() {
    var el = document.getElementById('loading');
    if (el) {
      el.querySelector('.subtitle').textContent = '首次加载较慢（约3MB），请耐心等待...';
    }
  }, 10000);
</script>
<script src="flutter_bootstrap.js" async></script>
</body>
</html>
